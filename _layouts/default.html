<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | cora denning</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  {% seo %}
</head>
<body>

<div id="spore-field" aria-hidden="true"></div>

<header class="site-header">
  <nav class="site-nav" aria-label="main navigation">
    <a href="/" {% if page.url == "/" %}aria-current="page"{% endif %} data-glyph="⁕">home</a>
    <span class="nav-dot" aria-hidden="true">·</span>
    <a href="/portfolio" {% if page.url contains "portfolio" %}aria-current="page"{% endif %} data-glyph="✦">work</a>
    <span class="nav-dot" aria-hidden="true">·</span>
    <a href="/blog" {% if page.url contains "blog" or page.url contains "posts" %}aria-current="page"{% endif %} data-glyph="∘">log</a>
    <span class="nav-dot" aria-hidden="true">·</span>
    <a href="/contact" {% if page.url contains "contact" %}aria-current="page"{% endif %} data-glyph="⋆">contact</a>
  </nav>
</header>

<main class="site-main" id="main-content">
  {{ content }}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span id="footer-sprite" aria-label="a small mushroom. click three times." title="...">⣀⠀⣀
⣿⣿⣿
⠈⠛⠁</span>
    <span id="soil-message" aria-live="polite"></span>
    <span class="footer-copy">&copy; {{ "now" | date: "%Y" }} cora denning</span>
  </div>
</footer>

<div id="lightbox" role="dialog" aria-label="image viewer" aria-modal="true">
  <img id="lightbox-img" src="" alt="">
</div>

<script src="/assets/js/main.js"></script>
</body>
</html>
