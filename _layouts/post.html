---
layout: default
---
<div id="read-vine" aria-hidden="true"></div>

<article class="post">
  <h1>{{ page.title }}</h1>
  <span class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</span>

  {{ content }}
</article>

<script>
  (function() {
    var vine = document.getElementById('read-vine');
    if (!vine) return;
    function update() {
      var el = document.documentElement;
      var pct = el.scrollTop / (el.scrollHeight - el.clientHeight);
      vine.style.height = (pct * 100) + 'vh';
    }
    window.addEventListener('scroll', update, { passive: true });
  })();
</script>
