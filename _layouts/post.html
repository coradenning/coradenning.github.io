---
layout: default
---
<div id="read-vine" aria-hidden="true"></div>
<div class="post-body">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <span class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</span>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</div>
<script>
  (function(){
    var v=document.getElementById('read-vine');
    if(!v)return;
    function u(){
      var d=document.documentElement;
      v.style.transform='scaleX('+(d.scrollTop/Math.max(1,d.scrollHeight-d.clientHeight))+')';
    }
    window.addEventListener('scroll',u,{passive:true});
  })();
</script>
