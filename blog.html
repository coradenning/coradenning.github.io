---
layout: default
title: log
---
<div class="page-body">
  <h1 class="page-title">the log</h1>
  <p class="page-subtitle">thoughts, notes, process. no particular schedule.</p>
  <ul class="post-list">
    {% for post in site.posts %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
      <span class="post-date">{{ post.date | date: "%Y·%m·%d" }}</span>
    </li>
    {% else %}
    <li class="post-empty">nothing here yet.</li>
    {% endfor %}
  </ul>
</div>
